<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mikrolabs Viagem 123 — Início</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/home/home.css" />
</head>
<body>

<div class="bg-map"></div>
<div class="bg-overlay"></div>

<div class="content-wrapper">
    <header class="navbar">
        <div class="brand">
            <span class="brand-icon">✈</span>
            <div>
                <div class="brand-name">Mikrolabs</div>
                <div class="brand-sub">Viagem 123</div>
            </div>
        </div>

        <nav class="nav-links">
            <a href="#" class="active">Início</a>
            <a href="#">Destinos</a>
            <a href="#">Pacotes</a>
            <a href="#">Sobre</a>
        </nav>

        <div class="nav-actions" id="nav-actions">
            <a href="/gerenciamento" class="btn-outline btn-admin" id="btn-admin" style="display:none;">Gerenciamento</a>
            <a href="/profile" class="btn-outline">Meu Perfil</a>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <p class="hero-tagline">Explore o mundo</p>
            <h1 class="hero-title">Descubra lugares<br/><em>inesquecíveis.</em></h1>

            <div class="search-bar">
                <div class="search-field">
                    <label>Destino</label>
                    <input type="text" placeholder="Para onde você quer ir?" id="search-name">
                </div>
                <div class="search-divider"></div>
                <div class="search-field">
                    <label>Check-in</label>
                    <input type="date" id="search-start-date">
                </div>
                <div class="search-divider"></div>
                <div class="search-field">
                    <label>Check-out</label>
                    <input type="date" id="search-end-date">
                </div>
                <a class="btn-search" onclick="getSearchPage()">Buscar</a>
            </div>
        </section>

        <section class="featured-destinations">
            <div class="section-header">
                <h2>Destinos Populares</h2>
<!--                <a href="#" class="view-all">Ver todos ➔</a>-->
            </div>

            <div class="destinations-grid">
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Mikrolabs Viagem 123. Todos os direitos reservados.</p>
    </footer>
</div>
<script src="/assets/home/home.js"></script>
</body>
</html>
